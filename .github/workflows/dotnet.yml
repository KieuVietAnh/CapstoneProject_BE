name: Deploy Urban Service API to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: urban-service-api
  CONTAINER_NAME: urban-service-api
  APP_DIR: /var/www/urban-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: http://152.42.177.174

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > image.tar.gz

      - name: Copy image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          source: "image.tar.gz,docker-compose.prod.yml"
          target: "${{ env.APP_DIR }}"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            set -e

            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}

            echo "Loading Docker image..."
            gunzip -c image.tar.gz | docker load

            echo "Creating .env file..."
            cat > .env << EOF
            DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}
            JWT_KEY=${{ secrets.JWT_KEY }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
            BREVO_SENDER_NAME=${{ secrets.BREVO_SENDER_NAME }}
            GOOGLE_AUTH_CLIENT_ID=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            AI_BASE_URL=${{ secrets.AI_BASE_URL }}
            AI_MODEL=${{ secrets.AI_MODEL }}
            AI_TIMEOUT_SECONDS=${{ secrets.AI_TIMEOUT_SECONDS }}
            EOF

            echo "Stopping old container if exists..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            echo "Starting new container..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Cleaning up..."
            rm -f image.tar.gz
            docker image prune -f

            echo "Current containers:"
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            echo "Waiting for container to start..."
            sleep 15

            if docker ps | grep -q ${{ env.CONTAINER_NAME }}; then
              echo "Container is running!"
              docker logs --tail 50 ${{ env.CONTAINER_NAME }}
              curl -I http://localhost:8080/swagger || true
            else
              echo "Container failed to start!"
              docker logs ${{ env.CONTAINER_NAME }} || true
              exit 1
            fi
