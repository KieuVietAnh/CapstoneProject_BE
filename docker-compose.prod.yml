services:
  backend:
    image: urban-service-api:latest
    container_name: urban-service-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}

      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}

      Brevo__ApiKey: ${BREVO_API_KEY}
      Brevo__SenderEmail: ${BREVO_SENDER_EMAIL}
      Brevo__SenderName: ${BREVO_SENDER_NAME:-UrbanService}

      GoogleAuth__ClientId: ${GOOGLE_AUTH_CLIENT_ID}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}

      PayOS__ClientId: ${PAYOS_CLIENT_ID}
      PayOS__ApiKey: ${PAYOS_API_KEY}
      PayOS__ChecksumKey: ${PAYOS_CHECKSUM_KEY}
      PayOS__ReturnUrl: ${PAYOS_RETURN_URL}
      PayOS__CancelUrl: ${PAYOS_CANCEL_URL}

      AI__BaseUrl: ${AI_BASE_URL}
      AI__Model: ${AI_MODEL:-qwen2.5vl:3b}
      AI__TimeoutSeconds: ${AI_TIMEOUT_SECONDS:-600}
      AI__MaxImagesPerFeedback: ${AI_MAX_IMAGES_PER_FEEDBACK:-0}
      AI__MaxImageBytes: ${AI_MAX_IMAGE_BYTES:-2097152}
      AI__ReviewFailureRetryDelayMinutes: ${AI_REVIEW_FAILURE_RETRY_DELAY_MINUTES:-15}
      AI__NumPredict: ${AI_NUM_PREDICT:-512}
      AI__NumContext: ${AI_NUM_CONTEXT:-4096}
      AI__Temperature: ${AI_TEMPERATURE:-0.1}

    restart: unless-stopped
